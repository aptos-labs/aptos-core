name: "Smoke Tests"

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      only_docs_changed:
        description: "Whether only docs changed (skip smoke tests if true)"
        required: true
        type: string

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  # Build aptos-node separately due to feature unification issues.
  build-smoke-aptos-node:
    if: inputs.only_docs_changed != 'true'
    runs-on: runs-on,cpu=64,family=c7,disk=large,image=aptos-ubuntu-x64,run-id=${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Build aptos-node
        run: cargo build --locked --package=aptos-node --features=failpoints,smoke-test --release
        shell: bash
      - name: Save aptos-node binary to cache
        uses: runs-on/cache/save@v4
        with:
          path: target/release/aptos-node
          key: smoke-aptos-node-${{ github.run_id }}

  # Build test archive + helper binaries in parallel with aptos-node.
  build-smoke-tests:
    if: inputs.only_docs_changed != 'true'
    runs-on: runs-on,cpu=64,family=c7,disk=large,image=aptos-ubuntu-x64,run-id=${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Build smoke test archive and helper binaries
        run: |
          # Build helper binaries needed by smoke tests
          cargo build --locked --release --package aptos --package aptos-debugger
          # Create nextest archive with compiled test binaries.
          # LOCAL_SWARM_NODE_RELEASE must be set at compile time (option_env!) so the
          # test binary uses the release aptos-node binary instead of building a debug one.
          LOCAL_SWARM_NODE_RELEASE=1 cargo nextest archive --locked --release --package smoke-test --archive-file smoke-test-archive.tar.zst
        shell: bash
      - name: Save smoke test artifacts to cache
        uses: runs-on/cache/save@v4
        with:
          path: |
            target/release/aptos
            target/release/aptos-debugger
            smoke-test-archive.tar.zst
          key: smoke-test-archive-${{ github.run_id }}

  # Run smoke tests in parallel partitions. This is a PR required job.
  rust-smoke-tests:
    needs: [build-smoke-aptos-node, build-smoke-tests]
    if: inputs.only_docs_changed != 'true'
    runs-on: runs-on,cpu=16,family=c7,disk=large,image=aptos-ubuntu-x64,run-id=${{ github.run_id }}
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4

      - name: Run postgres database
        run: docker run --detach -p 5432:5432 cimg/postgres:14.2
        shell: bash

      # Restore pre-built artifacts from both parallel build jobs
      - name: Restore aptos-node binary from cache
        uses: runs-on/cache/restore@v4
        with:
          path: target/release/aptos-node
          key: smoke-aptos-node-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Restore smoke test archive and helper binaries from cache
        uses: runs-on/cache/restore@v4
        with:
          path: |
            target/release/aptos
            target/release/aptos-debugger
            smoke-test-archive.tar.zst
          key: smoke-test-archive-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Run smoke tests partition ${{ matrix.partition }}/8
        run: |
          chmod +x target/release/aptos-node target/release/aptos target/release/aptos-debugger
          SMOKE_TEST_PREBUILD_BINARIES=1 \
          SMOKE_TEST_BIN_DIR=${{ github.workspace }}/target/release \
          LOCAL_SWARM_NODE_RELEASE=1 \
          cargo nextest run \
            --archive-file smoke-test-archive.tar.zst \
            --workspace-remap . \
            --profile smoke-test \
            --partition count:${{ matrix.partition }}/8
        shell: bash

      # Upload logs on failure for debugging.
      - name: Upload smoke test logs for failed and flaky tests
        if: ${{ failure() || success() }}
        uses: actions/upload-artifact@v4
        with:
          name: failed-smoke-test-logs-${{ matrix.partition }}
          include-hidden-files: true
          path: |
            /tmp/.tmp*
            !/tmp/.tmp*/**/db/
          retention-days: 14
