name: "Release move-flow"

on:
  workflow_dispatch:
    inputs:
      source_git_ref_override:
        type: string
        required: false
        description: "Override source ref (SHA / branch / tag):"
      dry_run:
        type: boolean
        required: false
        default: true
        description: "Dry run"

permissions:
  contents: read

concurrency:
  group: "move-flow-release"
  cancel-in-progress: false

jobs:
  prepare-source-tag:
    name: "Prepare source tag"
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Real-release workflow ref gate
        if: ${{ inputs.dry_run == false }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Real move-flow releases must be dispatched from refs/heads/main, got $GITHUB_REF."
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_git_ref_override || github.sha }}
          fetch-depth: 0
          filter: blob:none
          persist-credentials: false
      - name: Resolve source SHA
        id: resolve
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(awk -F'"' '/^\[/{s=$0} s=="[package]" && /^version *=/ {print $2; exit}' \
            aptos-move/flow/Cargo.toml)"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::aptos-move-flow version '$VERSION' must be MAJOR.MINOR.PATCH."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Preparing move-flow source tag v$VERSION."
      - name: Real-release gates
        env:
          TAG: "move-flow-v${{ steps.version.outputs.version }}"
          SOURCE_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --filter=blob:none origin \
            '+refs/heads/main:refs/remotes/origin/main' \
            '+refs/heads/aptos-release-v*:refs/remotes/origin/aptos-release-v*'
          REACHED_BY="$(git for-each-ref --count=1 --format='%(refname:short)' --contains="$SOURCE_SHA" \
            'refs/remotes/origin/main' 'refs/remotes/origin/aptos-release-v*')"
          if [ -z "$REACHED_BY" ]; then
            echo "::error::$SOURCE_SHA is not reachable from origin/main or origin/aptos-release-v*."
            exit 1
          fi
          echo "Source SHA reachable from $REACHED_BY."
          if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' already exists. Bump the version or delete the existing tag."
            exit 1
          fi
      - name: Create source tag
        if: ${{ inputs.dry_run == false }}
        env:
          TAG: "move-flow-v${{ steps.version.outputs.version }}"
          SOURCE_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          gh api --method POST "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/$TAG" \
            -f sha="$SOURCE_SHA"
