name: "Release move-flow"

on:
  workflow_dispatch:
    inputs:
      source_git_ref_override:
        type: string
        required: false
        description: "Override source ref (SHA / branch / tag):"
      release_title:
        type: string
        required: false
        description: "Custom release title. Defaults to 'move-flow v<version>':"
      dry_run:
        type: boolean
        required: false
        default: true
        description: "Dry run"

permissions:
  contents: read

concurrency:
  group: "move-flow-release"
  cancel-in-progress: false

jobs:
  preflight:
    name: "Pre-flight checks"
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      source_sha: ${{ steps.resolve.outputs.sha }}
      release_version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_git_ref_override || github.sha }}
          fetch-depth: 200
          persist-credentials: false
      - name: Resolve source SHA
        id: resolve
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          # Read the [package] version from the crate (matches publish-plugin.sh).
          VERSION="$(awk -F'"' '/^\[/{s=$0} s=="[package]" && /^version *=/ {print $2; exit}' \
            aptos-move/flow/Cargo.toml)"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::aptos-move-flow version '$VERSION' must be MAJOR.MINOR.PATCH."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing move-flow v$VERSION."
      - name: Real-release gates
        if: ${{ inputs.dry_run == false }}
        env:
          TAG: "move-flow-v${{ steps.version.outputs.version }}"
        run: |
          set -euo pipefail
          git fetch --no-tags --filter=blob:none --depth=200 origin \
            '+refs/heads/main:refs/remotes/origin/main' \
            '+refs/heads/release-*:refs/remotes/origin/release-*'
          HEAD_SHA="$(git rev-parse HEAD)"
          REACHED_BY="$(git for-each-ref --format='%(refname:short)' --contains="$HEAD_SHA" \
            'refs/remotes/origin/main' 'refs/remotes/origin/release-*' | head -n 1)"
          if [ -z "$REACHED_BY" ]; then
            echo "::error::HEAD $HEAD_SHA is not reachable from origin/main or origin/release-*."
            exit 1
          fi
          echo "HEAD reachable from $REACHED_BY."
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 \
             || gh api "repos/${{ github.repository }}/git/refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Release/tag '$TAG' already exists. Bump the version or delete the existing tag."
            exit 1
          fi

  release-move-flow:
    name: "Release move-flow"
    needs: preflight
    permissions:
      contents: write
      pull-requests: read
    uses: ./.github/workflows/binary-release.yaml
    with:
      binary_name: move-flow
      crate_name: aptos-move-flow
      build_profile: tool
      release_version: ${{ needs.preflight.outputs.release_version }}
      # Pass the SHA resolved by preflight so every build job in the shared
      # workflow pins to the same commit, even when the user supplied a branch.
      source_git_ref_override: ${{ needs.preflight.outputs.source_sha }}
      release_title: ${{ inputs.release_title || format('move-flow v{0}', needs.preflight.outputs.release_version) }}
      dry_run: ${{ inputs.dry_run }}

  publish-plugin:
    name: "Publish move-flow plugin PR to aptos-ai"
    needs: [preflight, release-move-flow]
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    # Holds the GitHub App credentials; gates cross-repo publishing.
    environment: move-flow-release
    steps:
      - name: Gate on GitHub App credentials
        id: gate
        env:
          APP_ID: ${{ secrets.APTOS_AI_PLUGIN_PUBLISHER_APP_ID }}
          APP_KEY: ${{ secrets.APTOS_AI_PLUGIN_PUBLISHER_APP_KEY }}
        run: |
          if [ -z "$APP_ID" ] || [ -z "$APP_KEY" ]; then
            echo "::notice::aptos-ai plugin publisher GitHub App not configured; skipping."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.ok == 'true'
        name: Generate aptos-ai token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APTOS_AI_PLUGIN_PUBLISHER_APP_ID }}
          private-key: ${{ secrets.APTOS_AI_PLUGIN_PUBLISHER_APP_KEY }}
          owner: aptos-labs
          repositories: aptos-ai
      - if: steps.gate.outputs.ok == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.source_sha }}
          persist-credentials: false
      - if: steps.gate.outputs.ok == 'true'
        uses: actions/checkout@v6
        with:
          repository: aptos-labs/aptos-ai
          token: ${{ steps.app-token.outputs.token }}
          path: aptos-ai
          ref: main
      - if: steps.gate.outputs.ok == 'true'
        uses: actions/download-artifact@v4
        with:
          name: binary-builds-x86_64-unknown-linux-gnu
          path: released-bin
      - if: steps.gate.outputs.ok == 'true'
        name: Publish plugin PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          MOVE_FLOW_BIN: ${{ github.workspace }}/released-bin/move-flow
          APTOS_CORE_SHA: ${{ needs.preflight.outputs.source_sha }}
          RELEASE_VERSION: ${{ needs.preflight.outputs.release_version }}
        run: |
          set -euo pipefail
          cd released-bin
          unzip -o "move-flow-v${RELEASE_VERSION}-x86_64-unknown-linux-gnu.zip"
          chmod +x ./move-flow
          cd ..
          git config --global user.email "aptos-bot@aptos.dev"
          git config --global user.name "aptos-bot"
          ./aptos-move/flow/scripts/publish-plugin.sh "${{ github.workspace }}/aptos-ai"
