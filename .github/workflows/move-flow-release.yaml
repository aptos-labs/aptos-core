name: "Release move-flow"

on:
  workflow_dispatch:
    inputs:
      release_version:
        type: string
        required: true
        description: "Release version (e.g. '1.0.4'):"
      source_git_ref_override:
        type: string
        required: false
        description: "Override source ref (SHA / branch / tag):"
      release_title:
        type: string
        required: false
        description: "Custom release title. Defaults to 'move-flow v<version>':"
      dry_run:
        type: boolean
        required: false
        default: true
        description: "Dry run — do not publish"
      skip_checks:
        type: boolean
        required: false
        default: false
        description: "Skip version checks (not allowed with dry_run=false)"

permissions:
  contents: read

concurrency:
  group: "move-flow-release-${{ inputs.release_version }}"
  cancel-in-progress: false

jobs:
  preflight:
    name: "Pre-flight checks"
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      source_sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Validate inputs
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          DRY_RUN: ${{ inputs.dry_run }}
          SKIP_CHECKS: ${{ inputs.skip_checks }}
        run: |
          if ! printf '%s' "$RELEASE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::release_version '$RELEASE_VERSION' must be MAJOR.MINOR.PATCH."
            exit 1
          fi
          if [ "$DRY_RUN" = "false" ] && [ "$SKIP_CHECKS" = "true" ]; then
            echo "::error::skip_checks=true is not allowed when dry_run=false."
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_git_ref_override || github.sha }}
          fetch-depth: 200
          persist-credentials: false
      - name: Resolve source SHA
        id: resolve
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Real-release gates
        if: ${{ inputs.dry_run == false }}
        env:
          TAG: "move-flow-v${{ inputs.release_version }}"
        run: |
          set -euo pipefail
          git fetch --no-tags --filter=blob:none --depth=200 origin \
            '+refs/heads/main:refs/remotes/origin/main' \
            '+refs/heads/release-*:refs/remotes/origin/release-*'
          HEAD_SHA="$(git rev-parse HEAD)"
          REACHED_BY="$(git for-each-ref --format='%(refname:short)' --contains="$HEAD_SHA" \
            'refs/remotes/origin/main' 'refs/remotes/origin/release-*' | head -n 1)"
          if [ -z "$REACHED_BY" ]; then
            echo "::error::HEAD $HEAD_SHA is not reachable from origin/main or origin/release-*."
            exit 1
          fi
          echo "HEAD reachable from $REACHED_BY."
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 \
             || gh api "repos/${{ github.repository }}/git/refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Release/tag '$TAG' already exists. Bump the version or delete the existing tag."
            exit 1
          fi

  release-move-flow:
    name: "Release move-flow"
    needs: preflight
    permissions:
      contents: write
      pull-requests: read
    uses: ./.github/workflows/binary-release.yaml
    with:
      binary_name: move-flow
      crate_name: aptos-move-flow
      build_profile: tool
      release_version: ${{ inputs.release_version }}
      # Pass the SHA resolved by preflight so every build job in the shared
      # workflow pins to the same commit, even when the user supplied a branch.
      source_git_ref_override: ${{ needs.preflight.outputs.source_sha }}
      release_title: ${{ inputs.release_title || format('move-flow v{0}', inputs.release_version) }}
      dry_run: ${{ inputs.dry_run }}
      skip_checks: ${{ inputs.skip_checks }}

  publish-plugin:
    name: "Publish move-flow plugin PR to aptos-ai"
    needs: [preflight, release-move-flow]
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Gate on PAT
        id: pat
        env:
          PLUGIN_PAT: ${{ secrets.APTOS_BOT_GH_PAT_APTOS_AI_PLUGIN_PUBLISHER }}
        run: |
          if [ -z "$PLUGIN_PAT" ]; then
            echo "::notice::APTOS_BOT_GH_PAT_APTOS_AI_PLUGIN_PUBLISHER not set; skipping."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.pat.outputs.ok == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.source_sha }}
          persist-credentials: false
      - if: steps.pat.outputs.ok == 'true'
        uses: actions/checkout@v6
        with:
          repository: aptos-labs/aptos-ai
          token: ${{ secrets.APTOS_BOT_GH_PAT_APTOS_AI_PLUGIN_PUBLISHER }}
          path: aptos-ai
          ref: main
      - if: steps.pat.outputs.ok == 'true'
        uses: actions/download-artifact@v4
        with:
          name: binary-builds-x86_64-unknown-linux-gnu
          path: released-bin
      - if: steps.pat.outputs.ok == 'true'
        name: Publish plugin PR
        env:
          GH_TOKEN: ${{ secrets.APTOS_BOT_GH_PAT_APTOS_AI_PLUGIN_PUBLISHER }}
          MOVE_FLOW_BIN: ${{ github.workspace }}/released-bin/move-flow
          APTOS_CORE_SHA: ${{ needs.preflight.outputs.source_sha }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          cd released-bin
          unzip -o "move-flow-v${RELEASE_VERSION}-x86_64-unknown-linux-gnu.zip"
          chmod +x ./move-flow
          cd ..
          git config --global user.email "aptos-bot@aptos.dev"
          git config --global user.name "aptos-bot"
          ./aptos-move/flow/scripts/publish-plugin.sh "${{ github.workspace }}/aptos-ai"
