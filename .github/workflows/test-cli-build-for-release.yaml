# Cross-compile smoke test for the Aptos CLI release path. Runs on pull requests
# only when the `aptos` crate version in crates/aptos/Cargo.toml is strictly
# higher than on the PR base (ignores downgrades / old versions).

name: "Test CLI build for release"

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-aptos-cli-version-changed:
    name: Check aptos crate version bump
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.compare.outputs.should_run }}
      cli_version: ${{ steps.compare.outputs.cli_version }}
    steps:
      - name: Compare aptos crate version to base branch (GitHub API, no checkout)
        id: compare
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          fetch_toml() {
            local sha="$1"
            curl -fsS \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/contents/crates%2Faptos%2FCargo.toml?ref=${sha}" \
              | python3 -c "import sys,json,base64; j=json.load(sys.stdin); print(base64.b64decode(j['content']).decode())"
          }

          version_from_toml() {
            printf '%s' "$1" | awk -F'"' '/^version = / { print $2; exit }'
          }

          BASE_VER="$(version_from_toml "$(fetch_toml "$BASE_SHA")")"
          HEAD_VER="$(version_from_toml "$(fetch_toml "$HEAD_SHA")")"

          echo "Base aptos version: $BASE_VER"
          echo "Head aptos version: $HEAD_VER"

          echo "cli_version=$HEAD_VER" >> "$GITHUB_OUTPUT"

          # Run only on a version bump (head strictly greater than base). Ignore downgrades.
          if [ "$HEAD_VER" != "$BASE_VER" ] && \
             [ "$(printf '%s\n' "$BASE_VER" "$HEAD_VER" | sort -V | tail -n 1)" = "$HEAD_VER" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # Same pattern as docker-build-test / rust-client-tests: require write access before
  # checking out PR head for expensive builds. `relax` skips the strict check when there
  # is no version bump (e.g. fork PRs that only touch the workflow file).
  permission-check:
    name: Check repository permission for release build matrix
    needs: [check-aptos-cli-version-changed]
    runs-on: 2cpu-gh-ubuntu24-x64
    steps:
      - name: Check repository permission for user which triggered workflow
        uses: sushichop/action-repository-permission@13d208f5ae7a6a3fc0e5a7c2502c214983f0241c
        with:
          required-permission: write
          comment-not-permitted: Sorry, you don't have permission to trigger this workflow.
          relax: ${{ needs.check-aptos-cli-version-changed.outputs.should_run != 'true' }}

  test-cli-build-for-release:
    name: test-cli-build-for-release (${{ matrix.platform }})
    needs: [check-aptos-cli-version-changed, permission-check]
    if: needs.check-aptos-cli-version-changed.outputs.should_run == 'true'
    env:
      CLI_VERSION: ${{ needs.check-aptos-cli-version-changed.outputs.cli_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Third argument "true" = skip GitHub release / strict version checks; fourth = Linux compatibility (generic CPU) mode
          - platform: linux-x86_64
            runs-on: ubuntu-22.04
            build_cmd: scripts/cli/build_cli_release.sh "Linux" "$CLI_VERSION" "true" "true"
          - platform: linux-aarch64
            runs-on: ubuntu-22.04-arm
            build_cmd: scripts/cli/build_cli_release.sh "Linux" "$CLI_VERSION" "true" "false"
          - platform: macos-arm64
            runs-on: macos-latest
            build_cmd: scripts/cli/build_cli_release.sh "macOS" "$CLI_VERSION" "true" "false"
          - platform: macos-x86_64
            runs-on: macos-15-intel
            build_cmd: scripts/cli/build_cli_release.sh "macOS" "$CLI_VERSION" "true" "false"
          - platform: windows-x86_64
            runs-on: windows-2025
            build_cmd: ""
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 180
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up CLI build (Unix)
        if: matrix.platform != 'windows-x86_64'
        uses: ./.github/actions/cli-rust-setup

      - name: Build CLI (Unix)
        if: matrix.platform != 'windows-x86_64'
        run: ${{ matrix.build_cmd }}

      - name: Ensure long paths work (Windows)
        if: matrix.platform == 'windows-x86_64'
        run: git config --global core.longpaths true

      - name: Build CLI (Windows)
        if: matrix.platform == 'windows-x86_64'
        shell: pwsh
        run: scripts\cli\build_cli_release.ps1
