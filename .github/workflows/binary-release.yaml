# This defines a workflow to build and release any binary from the aptos-core repository.
# In order to trigger it go to the Actions Tab of the Repo, click "Binary Release" and then "Run Workflow".

name: "Binary Release"

on:
  workflow_dispatch:
    inputs:
      binary_name:
        type: string
        required: true
        description: "The name of the binary to build (e.g., 'aptos-node', 'aptos-debugger'):"
      crate_name:
        type: string
        required: true
        description: "The crate name to build with -p flag (e.g., 'aptos-node', 'aptos-debugger'):"
      build_profile:
        type: choice
        required: true
        description: "Build profile to use:"
        options:
          - tool
          - performance
        default: tool
      release_version:
        type: string
        required: true
        description: "The release version. E.g. '1.2.3':"
      source_git_ref_override:
        type: string
        required: false
        description: "GIT_SHA_OVERRIDE: Use this to override the Git SHA1, branch name (e.g., devnet) or tag to build the binaries from. Defaults to the workflow Git REV:"
      release_title:
        type: string
        required: false
        description: "Optional custom release title. Defaults to '<binary-name> v<version>':"
      dry_run:
        type: boolean
        required: false
        default: true
        description: "Dry run - If checked, the release will not be created"
      skip_checks:
        type: boolean
        required: false
        default: false
        description: "Skip checks - If checked, the release will skip version checks"
  workflow_call:
    inputs:
      binary_name:
        type: string
        required: true
        description: "The name of the binary to build"
      crate_name:
        type: string
        required: true
        description: "The crate name to build with -p flag"
      build_profile:
        type: string
        required: true
        description: "Build profile to use (tool or performance)"
      release_version:
        type: string
        required: true
        description: "The release version"
      source_git_ref_override:
        type: string
        required: false
        description: "Git ref to build from"
      release_title:
        type: string
        required: false
        description: "Custom release title"
      dry_run:
        type: boolean
        required: false
        default: true
        description: "Dry run mode"
      skip_checks:
        type: boolean
        required: false
        default: false
        description: "Skip version checks"

jobs:
  preflight:
    name: "Pre-flight checks"
    runs-on: ubuntu-22.04
    permissions:
      contents: "read"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Validate release_version format
        run: |
          if ! echo "${{ inputs.release_version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::release_version '${{ inputs.release_version }}' is malformed."
            echo "::error::Expected semantic version of the form 'MAJOR.MINOR.PATCH' (e.g. '1.0.4'), matching ^[0-9]+\\.[0-9]+\\.[0-9]+$."
            exit 1
          fi
          echo "release_version '${{ inputs.release_version }}' has valid format."
      - name: Enforce skip_checks restriction
        run: |
          if [ "${{ inputs.dry_run }}" = "false" ] && [ "${{ inputs.skip_checks }}" = "true" ]; then
            echo "::error::skip_checks=true is not allowed when dry_run=false."
            echo "::error::Real releases must pass all version checks. Either set dry_run=true (testing) or skip_checks=false (real release)."
            exit 1
          fi
          echo "skip_checks gate OK (dry_run=${{ inputs.dry_run }}, skip_checks=${{ inputs.skip_checks }})."
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_git_ref_override || github.sha }}
          fetch-depth: 0
      - name: Validate source ref reachable from release branches (real releases only)
        if: ${{ inputs.dry_run == false }}
        run: |
          git fetch origin --no-tags --quiet
          HEAD_SHA="$(git rev-parse HEAD)"
          REACHED_BY=""
          while IFS= read -r BRANCH; do
            BRANCH="${BRANCH##[[:space:]]*}"
            case "$BRANCH" in
              origin/main|origin/release-*)
                REACHED_BY="$BRANCH"
                break
                ;;
            esac
          done < <(git branch -r --contains "$HEAD_SHA")
          if [ -z "$REACHED_BY" ]; then
            EFFECTIVE="${{ inputs.source_git_ref_override || github.ref_name }}"
            echo "::error::Real releases must originate from a commit reachable from 'origin/main' or an 'origin/release-*' branch."
            echo "::error::Effective source ref '$EFFECTIVE' (HEAD=$HEAD_SHA) is not on any allowed branch."
            echo "::error::Re-run from 'main' or a 'release-*' branch, or set dry_run=true."
            exit 1
          fi
          echo "HEAD '$HEAD_SHA' reachable from '$REACHED_BY' — allowed for real releases."
      - name: Tag-collision check
        if: ${{ inputs.dry_run == false }}
        run: |
          TAG="${{ inputs.binary_name }}-v${{ inputs.release_version }}"
          echo "Checking for existing release/tag '$TAG' ..."
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::A GitHub Release tagged '$TAG' already exists."
            echo "::error::Bump the version in Cargo.toml (and release_version input) or delete the existing release before re-running."
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG"; then
            echo "::error::A git tag '$TAG' already exists on origin."
            echo "::error::Bump the version in Cargo.toml (and release_version input) or delete the existing tag before re-running."
            exit 1
          fi
          echo "No existing release or tag named '$TAG'. Proceeding."

  build-linux-x86:
    name: "Build Linux x86_64"
    needs: preflight
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_git_ref_override || github.sha }}
      - uses: aptos-labs/aptos-core/.github/actions/cli-rust-setup@main
      - name: Build Binary
        run: |
          scripts/binary_release/build_binary_release.sh \
            "${{ inputs.binary_name }}" \
            "${{ inputs.crate_name }}" \
            "${{ inputs.build_profile }}" \
            "${{ inputs.release_version }}" \
            "${{ inputs.skip_checks }}"
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-builds-x86_64-unknown-linux-gnu
          path: |
            ${{ inputs.binary_name }}-*.zip
            ${{ inputs.binary_name }}-*.zip.sha256

  build-linux-arm:
    name: "Build Linux ARM64"
    needs: preflight
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_git_ref_override || github.sha }}
      - uses: aptos-labs/aptos-core/.github/actions/cli-rust-setup@main
      - name: Build Binary
        run: |
          scripts/binary_release/build_binary_release.sh \
            "${{ inputs.binary_name }}" \
            "${{ inputs.crate_name }}" \
            "${{ inputs.build_profile }}" \
            "${{ inputs.release_version }}" \
            "${{ inputs.skip_checks }}"
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-builds-aarch64-unknown-linux-gnu
          path: |
            ${{ inputs.binary_name }}-*.zip
            ${{ inputs.binary_name }}-*.zip.sha256

  build-macos-x86:
    name: "Build macOS x86_64"
    needs: preflight
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_git_ref_override || github.sha }}
      - uses: aptos-labs/aptos-core/.github/actions/cli-rust-setup@main
      - name: Build Binary
        run: |
          scripts/binary_release/build_binary_release.sh \
            "${{ inputs.binary_name }}" \
            "${{ inputs.crate_name }}" \
            "${{ inputs.build_profile }}" \
            "${{ inputs.release_version }}" \
            "${{ inputs.skip_checks }}"
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-builds-x86_64-apple-darwin
          path: |
            ${{ inputs.binary_name }}-*.zip
            ${{ inputs.binary_name }}-*.zip.sha256

  build-macos-arm:
    name: "Build macOS ARM64"
    needs: preflight
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_git_ref_override || github.sha }}
      - uses: aptos-labs/aptos-core/.github/actions/cli-rust-setup@main
      - name: Build Binary
        run: |
          scripts/binary_release/build_binary_release.sh \
            "${{ inputs.binary_name }}" \
            "${{ inputs.crate_name }}" \
            "${{ inputs.build_profile }}" \
            "${{ inputs.release_version }}" \
            "${{ inputs.skip_checks }}"
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-builds-aarch64-apple-darwin
          path: |
            ${{ inputs.binary_name }}-*.zip
            ${{ inputs.binary_name }}-*.zip.sha256

  build-windows-x86:
    name: "Build Windows x86_64"
    needs: preflight
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_git_ref_override || github.sha }}
      - name: Run cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # pin@v2.9.1
      - name: Ensure long paths work
        run: git config --global core.longpaths true
        shell: bash
      - name: Build Binary
        run: |
          .\scripts\binary_release\build_binary_release.ps1 `
            -BinaryName "${{ inputs.binary_name }}" `
            -CrateName "${{ inputs.crate_name }}" `
            -BuildProfile "${{ inputs.build_profile }}" `
            -Version "${{ inputs.release_version }}" `
            -SkipChecks $${{ inputs.skip_checks }}
        shell: powershell
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-builds-x86_64-pc-windows-msvc
          path: |
            ${{ inputs.binary_name }}-*.zip
            ${{ inputs.binary_name }}-*.zip.sha256

  release-binaries:
    name: "Release binaries"
    needs:
      - build-linux-x86
      - build-linux-arm
      - build-macos-x86
      - build-macos-arm
      - build-windows-x86
    runs-on: 2cpu-gh-ubuntu24-x64
    permissions:
      contents: "write"
      pull-requests: "read"
    if: ${{ inputs.dry_run == false }}
    steps:
      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-builds-*
          merge-multiple: true
      - name: List downloaded artifacts
        run: ls -lh
      - name: Create combined SHA256SUMS file
        run: |
          cat ${{ inputs.binary_name }}-*.zip.sha256 > SHA256SUMS
          echo "Combined checksums:"
          cat SHA256SUMS
      - name: Determine release title
        id: release_info
        run: |
          if [ -n "${{ inputs.release_title }}" ]; then
            echo "title=${{ inputs.release_title }}" >> "$GITHUB_OUTPUT"
          else
            echo "title=${{ inputs.binary_name }} v${{ inputs.release_version }}" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=${{ inputs.binary_name }}-v${{ inputs.release_version }}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # pin@v2.6.2
        with:
          tag_name: "${{ steps.release_info.outputs.tag }}"
          name: "${{ steps.release_info.outputs.title }}"
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            ${{ inputs.binary_name }}-*.zip
            ${{ inputs.binary_name }}-*.zip.sha256
            SHA256SUMS
