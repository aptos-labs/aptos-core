[profile.ci]
# Show skipped tests in the CI output.
status-level = "skip"
# Show output for all tests as soon as they fail and at the end of the test run.
failure-output = "immediate-final"
# Cancel test run on the first failure. Accounts for retries.
fail-fast = true
# To avoid CPU saturation and test timeouts (due to heavy/multithreaded
# tests), we increase the number of threads required per test.
threads-required = 3

junit = { path = "junit.xml" }

[profile.smoke-coverage]
test-threads = 6
retries = 3
status-level = "skip"
failure-output = "immediate-final"
junit = { path = "junit.xml" }

[profile.default.slow-timeout]
period = "600s"
terminate-after = 1

[profile.smoke-test]
# like profile.ci
status-level = "skip"
failure-output = "immediate-final"
fail-fast = true
# different than ci
test-threads = 6
# Reduced from 3 to 1: combined with SWARM_BUILD_NUM_RETRIES=1, gives 2×2=4 total
# attempts per test (was 4×4=16). Fewer retries reduce resource contention when
# multiple tests compete for ports on the same CI instance.
retries = 1
slow-timeout = { period = "1800s", terminate-after = 1 }
