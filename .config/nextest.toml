[profile.ci]
# Show skipped tests in the CI output.
status-level = "skip"
# Show output for all tests as soon as they fail and at the end of the test run.
failure-output = "immediate-final"
# Cancel test run on the first failure. Accounts for retries.
fail-fast = true
# To avoid CPU saturation and test timeouts (due to heavy/multithreaded
# tests), we increase the number of threads required per test.
threads-required = 3

junit = { path = "junit.xml" }

[profile.smoke-coverage]
test-threads = 6
retries = 3
status-level = "skip"
failure-output = "immediate-final"
junit = { path = "junit.xml" }

[profile.default.slow-timeout]
period = "600s"
terminate-after = 1

[profile.smoke-test]
# like profile.ci
status-level = "skip"
failure-output = "immediate-final"
fail-fast = true
# different than ci
test-threads = 6
retries = 3
slow-timeout = { period = "1800s", terminate-after = 1 }

# Run the slowest smoke tests first so they start filling slots immediately
# instead of waiting behind alphabetically-earlier fast tests.
# This avoids the "long tail" problem (e.g. test_db_restart starting 29 min
# late and being the sole test running for the last 4 min).
[[profile.smoke-test.overrides]]
filter = 'test(jwk_consensus_basic) | test(jwk_consensus_per_issuer) | test(jwk_consensus_per_key) | test(jwk_consensus_provider_change_mind) | test(test_validator_genesis_transaction) | test(test_db_restart)'
priority = 10
