{{- range $i, $e := until (int .Values.numValidators) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aptos-validator.fullname" $ }}-{{$i}}-validator
  labels:
    {{- include "aptos-validator.labels" $ | nindent 4 }}
    {{- include "aptos-validator.multiclusterLabels" (tuple $ $i) | nindent 4 }} 
  annotations:
    {{- with $.Values.service.validator.internal.annotations }}
    {{- toYaml $.Values.service.validator.internal.annotations | nindent 4 }}
    {{- end }}
    {{- if $.Values.service.validator.enableRestStandaloneNeg }}
    cloud.google.com/neg: '{"exposed_ports":{"8080":{"name":"{{ include "aptos-validator.fullname" $ }}-{{$i}}-validator-neg"}}}'
    {{- end }}
    {{- if $.Values.service.internalDomain }}
    external-dns.alpha.kubernetes.io/hostname: val{{$i}}.{{ $.Values.service.internalDomain }}
    {{- end }}
spec:
  selector:
    {{- include "aptos-validator.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/name: validator
    app.kubernetes.io/instance: validator-{{$i}}
  type: {{ $.Values.service.validator.internal.type }}
  {{- if $.Values.service.validator.internal.headless }}
  clusterIP: None
  {{- end }}
  ports:
  - name: validator # Incomming connections from validators
    port: 6180
  - name: fullnode # Incomming connections from validator fullnodes
    port: 6181
  - name: pfn # Incomming connections from public fullnodes
    port: 6182
  {{- if $.Values.service.validator.enableRestApi }}
  - name: api
    port: 8080
  {{- end }}
  - name: metrics
    port: 9101
  - name: admin
    port: 9102

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "aptos-validator.fullname" $ }}-{{$i}}-validator-e{{ $.Values.chain.era }}
  labels:
    {{- include "aptos-validator.labels" $ | nindent 4 }}
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: {{ $.Values.validator.storage.class }}
  resources:
    requests:
      storage: {{ $.Values.validator.storage.size }}
  {{- if $.Values.validator.storage.labels }}
  selector:
    matchLabels:
      {{- toYaml $.Values.validator.storage.labels | nindent 6}}
  {{- end }}

---
{{ $validator_statefulset := lookup "apps/v1" "StatefulSet" $.Release.Namespace (printf "%s-%d-validator" (include "aptos-validator.fullname" $) $i) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "aptos-validator.fullname" $ }}-{{$i}}-validator
  labels:
    {{- include "aptos-validator.labels" $ | nindent 4 }}
    app.kubernetes.io/name: validator
    app.kubernetes.io/instance: validator-{{$i}}
    {{- include "aptos-validator.multiclusterLabels" (tuple $ $i) | nindent 4 }}  
spec:
  serviceName: {{ include "aptos-validator.fullname" $ }}-{{$i}}-validator
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "aptos-validator.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/name: validator
      app.kubernetes.io/instance: validator-{{$i}}
  template:
    metadata:
      labels:
        {{- include "aptos-validator.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/name: validator
        app.kubernetes.io/instance: validator-{{$i}}
        {{- if $.Values.chain.name }}
        chain_name: {{ $.Values.chain.name }}
        {{- end }}
        {{- if and $.Values.azure_genesis_storage.enabled $.Values.azure_genesis_storage.workloadIdentityClientId }}
        azure.workload.identity/use: "true"
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") $ | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "9101"
        {{- if $.Values.metrics.destination }}
        aptos.dev/metrics-destination: {{ $.Values.metrics.destination }}
        {{- end}}
        {{- with $.Values.fullnode.podAnnotations }}
        {{- toYaml $.Values.fullnode.podAnnotations | nindent 8 }}
        {{- end }}
    spec:
      # Give the binary time to drain in-flight consensus / REST work after SIGTERM. Pairs with
      # the validator container's preStop sleep, which delays SIGTERM long enough for kube-proxy
      # and the GKE NEG controller to remove this pod from Service endpoints / NEGs.
      terminationGracePeriodSeconds: {{ $.Values.validator.terminationGracePeriodSeconds }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        {{- if $.Values.azure_genesis_storage.enabled }}
        # Fetch genesis from Azure Blob Storage
        - name: fetch-genesis-azure
          image: mcr.microsoft.com/azure-cli:latest
          command:
            - bash
            - -c
            - |
              set -ex
              cp /opt/aptos/genesis_readonly/* /opt/aptos/genesis || true
              if [[ ! -f /opt/aptos/genesis/genesis.blob ]]; then
                echo "genesis.blob not found locally, downloading from Azure..."
                # Azure AD Workload Identity - auto-authenticated via injected token
                az login --service-principal \
                  --username "$AZURE_CLIENT_ID" \
                  --tenant "$AZURE_TENANT_ID" \
                  --federated-token "$(cat $AZURE_FEDERATED_TOKEN_FILE)" \
                  --allow-no-subscriptions
                az storage blob download \
                  --account-name {{ $.Values.azure_genesis_storage.storageAccount }} \
                  --container-name {{ $.Values.azure_genesis_storage.container }} \
                  --name "{{ $.Values.azure_genesis_storage.blobPath }}/genesis.blob" \
                  --file /opt/aptos/genesis/genesis.blob \
                  --auth-mode login
              else
                echo "genesis.blob found locally"
              fi
              ls -l /opt/aptos/genesis
          workingDir: /tmp
          env:
          - name: HOME
            value: /tmp
          volumeMounts:
            - name: genesis-config
              mountPath: /opt/aptos/genesis_readonly
            - name: writable-genesis
              mountPath: /opt/aptos/genesis
        {{- else if not (empty $.Values.genesis_bucket_path) }}
        # Fetch genesis from GCS bucket
        - name: fetch-genesis
          {{- if and $validator_statefulset (not $.Values.manageImages) }}
          image: {{ (first $validator_statefulset.spec.template.spec.initContainers).image }}
          {{- else }}
          image: {{ $.Values.tools.image.repo }}:{{ $.Values.tools.image.tag | default $.Values.imageTag }}
          {{- end }}
          command:
            - bash
            - -c
            - |
              set -x
              cp /opt/aptos/genesis_readonly/* /opt/aptos/genesis
              if [[ ! -f /opt/aptos/genesis/genesis.blob ]]; then
                gcloud storage cp "{{ $.Values.genesis_bucket_path }}/genesis.blob" /opt/aptos/genesis/genesis.blob
              else
                echo "genesis.blob found locally"
              fi
              ls -l /opt/aptos/genesis
          workingDir: /tmp
          env:
          - name: HOME
            value: /tmp
          volumeMounts:
            - name: genesis-config
              mountPath: /opt/aptos/genesis_readonly
            - name: writable-genesis
              mountPath: /opt/aptos/genesis
        {{- else }}
        # Fallback: fetch genesis via signed URL
        - name: run-script
          {{- if and $validator_statefulset (not $.Values.manageImages) }}
          image: {{ (first $validator_statefulset.spec.template.spec.initContainers).image }}
          {{- else }}
          image: {{ $.Values.tools.image.repo }}:{{ $.Values.tools.image.tag | default $.Values.imageTag }}
          {{- end }}
          args:
            - bash
            - -c
            - |
              set -x
              cp /opt/aptos/genesis_readonly/* /opt/aptos/genesis
              if [[ ! -f /opt/aptos/genesis/genesis.blob ]]; then
                genesis_blob_upload_url="{{ $.Values.genesis_blob_upload_url }}"
                genesis_blob_upload_url="$genesis_blob_upload_url&namespace={{ $.Release.Namespace }}&method=GET"
                echo "genesis.blob not found locally, downloading..."
                signed_url=$(curl -s -X GET "$genesis_blob_upload_url")
                curl -o /opt/aptos/genesis/genesis.blob "$signed_url"
              else
                echo "genesis.blob found locally"
              fi
              ls -l /opt/aptos/genesis
          volumeMounts:
            - name: genesis-config
              mountPath: /opt/aptos/genesis_readonly
            - name: writable-genesis
              mountPath: /opt/aptos/genesis
        {{- end }}
        {{- if or $.Values.trustedSetup.digestKeyUrl $.Values.trustedSetup.publicParametersUrl }}
        # Trusted setup: download to a persistent dir, idempotent via .url marker files.
        # Bumping trustedSetup.refreshCounter clears markers to force re-download.
        - name: fetch-trusted-setup
          image: {{ $.Values.tools.image.repo }}:{{ $.Values.tools.image.tag | default $.Values.imageTag }}
          command:
            - bash
            - -c
            - |
              set -ex
              mkdir -p '{{ $.Values.trustedSetup.path }}'
              cd '{{ $.Values.trustedSetup.path }}'
              ts_start=$SECONDS
              refresh_counter='{{ $.Values.trustedSetup.refreshCounter | default 0 }}'
              if [[ "$(cat .refresh-counter 2>/dev/null || true)" != "$refresh_counter" ]]; then
                rm -f *.url
                printf '%s' "$refresh_counter" > .refresh-counter
              fi
              fetch_trusted_setup() {
                local file=$1 url=$2
                if [[ -z "$url" ]]; then return 0; fi
                if [[ -f "$file" && "$(cat "$file.url" 2>/dev/null || true)" == "$url" ]]; then
                  echo "$file up to date"
                  return 0
                fi
                echo "Fetching $file from $url"
                curl -fsSL -o "$file.tmp" \
                  -w "$file: %{size_download} bytes in %{time_total}s (avg %{speed_download} B/s)\n" \
                  "$url"
                mv "$file.tmp" "$file"
                printf '%s' "$url" > "$file.url"
              }
              fetch_trusted_setup digest_key.bin '{{ $.Values.trustedSetup.digestKeyUrl }}'
              fetch_trusted_setup pp.bin '{{ $.Values.trustedSetup.publicParametersUrl }}'
              ls -l .
              echo "Trusted setup ready in $((SECONDS - ts_start))s"
          workingDir: /tmp
          env:
          - name: HOME
            value: /tmp
          volumeMounts:
            - name: aptos-data
              mountPath: /opt/aptos/data
        {{- end }}
      containers:
      - name: validator
        {{- if and $validator_statefulset (not $.Values.manageImages) }} # if the statefulset already exists and we do not want helm to simply overwrite the image, use the existing image
        image: {{ (first $validator_statefulset.spec.template.spec.containers).image }}
        {{- else }}
        image: {{ $.Values.validator.image.repo }}:{{ $.Values.validator.image.tag | default $.Values.imageTag }}
        {{- end }}
      {{- with $.Values.validator }}
        imagePullPolicy: {{ .image.pullPolicy }}
        {{- with .healthChecks }}
        {{- if and .enabled (or (not .filterReplicas) (index .filterReplicas $i)) }}
        # Wait for up to 300 seconds before starting the liveness and readiness probes.
        # The node will open the API port only after initializing the storage.
        startupProbe:
          tcpSocket:
            port: api
          periodSeconds: 3
          timeoutSeconds: 1
          failureThreshold: 100
        # Mark pod unhealthy if it falls out of consensus.
        readinessProbe:
          httpGet:
            port: metrics
            path: /consensus_health_check
          # Delay probe execution to ensure the node has had the time to connect to the network.
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        # Restart the pod if the REST API is ever unresponsive for 60 seconds.
        {{- if .enableLivenessProbe }}
        livenessProbe:
          httpGet:
            port: api
            path: /v1/-/healthy
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 4
        {{- end }} # if .enableLivenessProbe
        {{- end }} # if .enabled
        {{- end }} # with .healthChecks
        # Sleep before SIGTERM so kube-proxy + the GKE NEG controller have time to remove this
        # pod from Service endpoints / NEGs (triggered by deletionTimestamp). Without this delay,
        # GCP truncates connections at termination time, killing in-flight tx submits.
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep {{ .preStopSleepSeconds }}"]
        args:
          - /bin/bash
          - -c
          - |-
            set -euxo pipefail
            if [[ -f /opt/aptos/data/wipe-db ]]; then
              # Wipe DB
              rm -rf /opt/aptos/data/db
              # Delete the command file so we only wipe the DB once
              rm -vf /opt/aptos/data/wipe-db
            fi
            exec /usr/local/bin/aptos-node -f /opt/aptos/etc/validator.yaml
        resources:
          {{- toYaml .resources | nindent 10 }}
        env:
        - name: RUST_LOG
          value: {{ .rust_log }}
        {{- if .force_enable_telemetry }}
        - name: APTOS_FORCE_ENABLE_TELEMETRY
          value: "true"
        {{- end }}
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: RUST_BACKTRACE
          value: "0"
        - name: MALLOC_CONF
          value: {{ .malloc_conf }}
      {{- end }}
        volumeMounts:
        - name: aptos-config
          mountPath: /opt/aptos/etc
        - name: writable-genesis
          mountPath: /opt/aptos/genesis
        - name: aptos-data
          mountPath: /opt/aptos/data
        ports:
        - containerPort: 6180
          name: validator
        - containerPort: 6181  # VFN
          name: fullnode
        - containerPort: 6182  # Public
          name: pfn
        - containerPort: 8080
          name: api
        - containerPort: 9101
          name: metrics
        - containerPort: 9102
          name: admin
        securityContext:
          {{- if $.Values.enablePrivilegedMode }}
          runAsUser: 0
          privileged: true
          {{- else }}
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          {{- end }}
      {{- with $.Values.validator }}
      {{- with .nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- if $.Values.enablePrivilegedMode }}
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        {{- else }}
        runAsNonRoot: true
        runAsUser: 6180
        runAsGroup: 6180
        fsGroup: 6180
        {{- end }}
        seccompProfile:
          type: RuntimeDefault
      {{- end }}
      volumes:
      - name: aptos-config
        configMap:
          name: {{ include "aptos-validator.fullname" $ }}-{{$i}}
      - name: genesis-config
        # Current implementation of `forge::backend::k8s::stateful_set::{set_identity, get_identity}`
        # depends on the position of this volume item within the parent list.
        secret:
          secretName: {{ include "aptos-validator.fullname" $ }}-{{$i}}-genesis-e{{ $.Values.chain.era }}
      - name: aptos-data
        persistentVolumeClaim:
          claimName: {{ include "aptos-validator.fullname" $ }}-{{$i}}-validator-e{{ $.Values.chain.era }}
      - name: writable-genesis
        emptyDir: {}
      serviceAccountName: {{ include "aptos-validator.validatorServiceAccountName" $ }}
      {{- if $.Values.imagePullSecret }}
      imagePullSecrets:
      - name: {{ $.Values.imagePullSecret }}
      {{- end }}
{{- end }}
