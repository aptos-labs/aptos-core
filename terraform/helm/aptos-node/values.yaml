chain:
  # -- Internal: name of the testnet to connect to
  name: testnet
  # -- Bump this number to wipe the underlying storage
  era: 1
  # -- Chain ID
  chain_id: 4

# -- Default image tag to use for all validator and fullnode images
imageTag: devnet

# -- Number of validators to deploy
numValidators: 1
# -- Total number of fullnode groups to deploy
numFullnodeGroups: 1

# -- Options for multicluster mode. This is *experimental only*.
multicluster:
  enabled: false
  targetClusters: ["forge-multiregion-1", "forge-multiregion-2", "forge-multiregion-3"]

# -- Specify validator and fullnode NodeConfigs via named ConfigMaps, rather than the generated ones from this chart.
overrideNodeConfig: false

# -- If true, helm will always override the deployed image with what is configured in the helm values. If not, helm will take the latest image from the currently running workloads, which is useful if you have a separate procedure to update images (e.g. rollout)
manageImages: true

haproxy:
  # -- Enable HAProxy deployment in front of validator and fullnodes
  enabled: true
  # -- Number of HAProxy replicas
  replicas: 1
  image:
    # -- Image repo to use for HAProxy images
    repo: haproxy
    # -- Image tag to use for HAProxy images
    tag: 3.0.18@sha256:6e6dcc6aa3ea63091c675db38c35bea31b8bec9bb3aa19b708435e900248fabf
    # -- Image pull policy to use for HAProxy images
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 5
      memory: 1G
    requests:
      cpu: 1
      memory: 200M
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  # -- Hint to the scheduler to place HAproxy close to its VN
  compactPlacement: false

  config:
    # -- Whether to send Proxy Protocol v2
    send_proxy_protocol: &send_proxy_protocol false
    # -- System user to run HA
    user: nobody
  # -- Name of the Kubernetes TLS secret to use for HAProxy
  tls_secret:

tools:
  image:
    # -- Image repo to use for tools images
    repo: aptoslabs/tools
    # -- Image tag to use for tools images. If set, overrides `imageTag`
    tag:
    # -- Image pull policy to use for tools images
    pullPolicy: IfNotPresent

validator:
  # -- Internal: name of your validator for use in labels
  name:
  image:
    # -- Image repo to use for validator images
    repo: aptoslabs/validator
    # -- Image tag to use for validator images. If set, overrides `imageTag`
    tag:
    # -- Image pull policy to use for validator images
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 30
      memory: 60Gi
    requests:
      cpu: 30
      memory: 60Gi
  storage:
    # -- Kubernetes storage class to use for validator persistent storage
    class:
    # -- Size of validator persistent storage
    size: 2048Gi
  # -- Log level for the validator
  rust_log: info
  # -- Configuration for jemalloc
  malloc_conf: ""
  # -- Flag to force enable telemetry service (useful for forge tests)
  force_enable_telemetry: false
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  # -- Validator configuration. See NodeConfig https://github.com/aptos-labs/aptos-core/blob/main/config/src/config/mod.rs
  config: {}
  # -- DEPRECATED: it's broken with Cillium a.k.a. GKE DataplaneV2.
  # -- templates/networkpolicy.yaml kept around for reference in case we want to resurrect it.
  # -- Lock down network ingress and egress with Kubernetes NetworkPolicy
  enableNetworkPolicy: false
  podAnnotations:
    # Determines which log levels are retained by the Vector pipeline
    # aptos.dev/min-log-level-to-retain: warn
  healthChecks:
    enabled: false
    enableLivenessProbe: false
    # If set, only update certain replicas. An useful hack for staged rollout.
    filterReplicas:
  # -- Pod terminationGracePeriodSeconds: time the validator binary has to commit in-flight
  # consensus / REST work after SIGTERM before SIGKILL. Set high enough to cover the slowest
  # graceful shutdown path.
  terminationGracePeriodSeconds: 60
  # -- preStop sleep: pause before SIGTERM so kube-proxy + the GKE NEG controller have time to
  # remove this pod from Service endpoints / NEGs after the pod's deletionTimestamp is set.
  # Without this, in-flight LB/NEG traffic can be cut at termination time.
  preStopSleepSeconds: 15

fullnode:
  # -- Specify fullnode groups by `name` and number of `replicas`
  groups:
    - name: fullnode
      dns_name: vfn
      replicas: 1
  resources:
    limits:
      cpu: 30
      memory: 60Gi
    requests:
      cpu: 30
      memory: 60Gi
  storage:
    # -- Kubernetes storage class to use for fullnode persistent storage
    class:
    # -- Size of fullnode persistent storage
    size: 2048Gi
  # -- Log level for the fullnode
  rust_log: info
  # -- Configuration for jemalloc
  malloc_conf: ""
  # -- Flag to force enable telemetry service (useful for forge tests)
  force_enable_telemetry: false
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  # -- Hint to the scheduler to place the VFN close to its VN
  compactPlacement: false
  # -- Fullnode configuration. See NodeConfig https://github.com/aptos-labs/aptos-core/blob/main/config/src/config/mod.rs
  config:
    # This full_node_networks config block allows changing only the below parameters for public fullnode networks
    # The rest of the configs are inherited from fullnode-base.yaml
    # Arrays in helm are immutable, so we fall back to string templating
    full_node_networks:
      # The first item in the array `full_node_networks` must always refer to the public fullnode network
      - network_id: "public"
  podAnnotations:
    # Determines which log levels are retained by the Vector pipeline
    # aptos.dev/min-log-level-to-retain: warn

service:
  # -- If set, the base domain name to use for External DNS
  domain:
  # -- If set, the base domain name to use for internal LBs
  internalDomain:
  validator:
    external:
      # -- The Kubernetes ServiceType to use for validator's HAProxy
      type: LoadBalancer
    internal:
      # -- The Kubernetes ServiceType to use for validator
      type: ClusterIP
      headless: false
      annotations: {}
    # -- The externalTrafficPolicy for the validator service
    externalTrafficPolicy: Local
    # -- If set and if the ServiceType is LoadBalancer, allow traffic to validators from these CIDRs
    loadBalancerSourceRanges:
    # -- Enable the PFN port to allow the validator to answer PFN queries, removing the need for a VFN.
    enablePfnPort: false
    # -- Enable the REST API on the validator
    enableRestApi: true
    # -- Enable a standalone NEG for the validator REST API (GKE only)
    enableRestStandaloneNeg: false
    # -- Enable the metrics port on the validator
    enableMetricsPort: false
    # -- Enable the admin port on the validator
    enableAdminPort: false
  fullnode:
    external:
      # -- The Kubernetes ServiceType to use for fullnodes' HAProxy
      type: LoadBalancer
    internal:
      # -- The Kubernetes ServiceType to use for fullnodes
      type: ClusterIP
      headless: false
      annotations: {}
    # -- The externalTrafficPolicy for the fullnode service
    externalTrafficPolicy: Local
    # -- If set and if the ServiceType is LoadBalancer, allow traffic to fullnodes from these CIDRs
    loadBalancerSourceRanges:
    # -- Enable the REST API on fullnodes
    enableRestApi: true
    # -- Enable the metrics port on fullnodes
    enableMetricsPort: false
    # -- Enable the admin port on fullnodes
    enableAdminPort: false

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
  name:

metrics:
  # -- The upstream sink for metrics. Supported values are "dev" and "prod"
  destination: dev

# -- Load test-data for starting a test network
loadTestGenesis: false

# -- TEST ONLY: Enable running as root for profiling
enablePrivilegedMode: false

genesis_blob_upload_url: https://us-west1-aptos-forge-gcp-0.cloudfunctions.net/signed-url?cluster_name=unknown&era=1
# -- GCS bucket path for genesis artifacts (e.g., gs://bucket-name/genesis/namespace/current)
genesis_bucket_path:
# -- Trusted setup configuration. Bytes are downloaded once per PVC and reused
# across pod restarts (idempotent based on URL marker). Bump refreshCounter to
# force re-download without changing the URLs.
trustedSetup:
  # -- Directory on a persistent mount where the trusted setup files are written.
  # Must live on a writable, persistent volume (aptos-data PVC by default).
  path: /opt/aptos/data/trusted-setup
  # -- Bump to force re-download of all trusted-setup files even if URLs unchanged.
  refreshCounter: 0
  # -- URL to download the digest key blob (e.g., https://github.com/aptos-labs/aptos-networks/raw/.../digest_key.bin)
  digestKeyUrl: ""
  # -- URL to download the public parameters blob (e.g., https://github.com/aptos-labs/aptos-networks/raw/.../pp.bin)
  publicParametersUrl: ""
# -- Azure Blob Storage configuration for genesis artifacts (alternative to GCS)
azure_genesis_storage:
  # -- Enable Azure Blob Storage for genesis
  enabled: false
  # -- Azure Storage Account name
  storageAccount:
  # -- Azure Blob Container name
  container:
  # -- Blob path prefix (e.g., genesis/devnet-azure/current)
  blobPath:
  # -- Client ID for Azure AD Workload Identity
  # Required when enabled=true. Uses federated tokens for authentication.
  workloadIdentityClientId:
cluster_name: unknown

# Additional labels
labels:

# Infra migrations
migrations:
  # -- Explicitly define a PVC for VFNs.
  # -- See templates/fullnode.yaml
  enable_vfn_explicit_pvc: false
