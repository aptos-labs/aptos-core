[workspace]
# Empty workspace table to make this a standalone crate outside the main workspace

[package]
name = "move-decompiler-wasm"
description = "Move bytecode decompiler and disassembler for WebAssembly"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
anyhow = "1.0"
getrandom = { version = "0.2", features = ["js"] }
move-asm = { path = "../../third_party/move/tools/move-asm" }
move-binary-format = { path = "../../third_party/move/move-binary-format" }
move-core-types = { path = "../../third_party/move/move-core/types" }
move-decompiler = { path = "../../third_party/move/tools/move-decompiler" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wasm-bindgen = "0.2"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
