[package]
name = "aptos-move-flow"
description = "MoveFlow: agent support for Move"
version = "1.1.0"

authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
publish = false
repository = { workspace = true }
rust-version = { workspace = true }

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/{ bin }-v{ version }/{ bin }-v{ version }-{ target }.zip"
bin-dir = "{ bin }{ binary-ext }"
pkg-fmt = "zip"

[package.metadata.binstall.overrides.x86_64-pc-windows-msvc]
pkg-url = "{ repo }/releases/download/{ bin }-v{ version }/{ bin }-v{ version }-{ target }.zip"

[[bin]]
name = "move-flow"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
aptos-cli-common = { workspace = true }
aptos-framework = { workspace = true }
aptos-gas-profiling = { workspace = true }
aptos-gas-schedule = { workspace = true }
aptos-move-cli = { workspace = true }
aptos-move-debugger = { workspace = true }
aptos-rest-client = { workspace = true }
aptos-types = { workspace = true }
aptos-validator-interface = { workspace = true }
aptos-vm = { workspace = true, features = ["testing"] }
aptos-vm-types = { workspace = true }
async-trait = { workspace = true }
clap = { workspace = true, features = ["derive"] }
codespan-reporting = { workspace = true }
legacy-move-compiler = { workspace = true }
log = { workspace = true }
move-command-line-common = { workspace = true }
move-compiler-v2 = { workspace = true }
move-core-types = { workspace = true }
move-coverage = { workspace = true }
move-ir-types = { workspace = true }
move-model = { workspace = true }
move-package = { workspace = true }
move-package-cache = { workspace = true }
move-prover = { workspace = true }
move-symbol-pool = { workspace = true }
move-unit-test = { workspace = true }
move-vm-runtime = { workspace = true }
notify = { workspace = true }
pathsearch = { workspace = true }
rmcp = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
self_update = { git = "https://github.com/banool/self_update.git", rev = "8306158ad0fd5b9d4766a3c6bf967e7ef0ea5c4b", features = [
    "archive-zip",
    "compression-zip-deflate",
] }
tempfile = { workspace = true }
tera = { workspace = true }
tokio = { workspace = true }
tracing-log = { workspace = true }
url = { workspace = true }
walkdir = { workspace = true }

[dev-dependencies]
aptos-crypto = { workspace = true }
aptos-package-builder = { workspace = true }
move-core-types = { workspace = true }
move-prover-test-utils = { workspace = true }
regex = { workspace = true }
rmcp = { workspace = true, features = ["client"] }
tempfile = { workspace = true }
