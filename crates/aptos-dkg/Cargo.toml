[package]
name = "aptos-dkg"
version = "0.1.0"
edition = "2021"
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = { workspace = true }
aptos-crypto = { workspace = true }
aptos-crypto-derive = { workspace = true }
bcs =  { workspace = true }
blstrs = { workspace = true }
criterion = { workspace = true }
group = { workspace = true }
hex = { workspace = true }
merlin = { workspace = true }
more-asserts = { workspace = true }
num-traits = { workspace = true }
once_cell = { workspace = true }
rand = { workspace = true }
rand_core = { workspace = true }
serde = { workspace = true }
serde_bytes = { workspace = true }
sha3 = { workspace = true }
static_assertions = { workspace = true }

# TODO: Move these into the main Cargo.toml eventually
bellman = { version = "0.13.1", default-features = false }
derive_more = "0.99.17"
ff = "0.13"
# Need this version because it in turn depends on the right version of `rand` and `rand_core`
num-bigint = { version = "0.3.2", features = ["rand"] }
num-integer = "0.1.42"
pairing = "0.23"
serde_with = "2.2.0"

[features]
assert-private-keys-not-cloneable = []
fuzzing = []

[[bench]]
name = "pvss"
harness = false

[[bench]]
name = "crypto"
harness = false

[[bench]]
name = "weighted_vuf"
harness = false

[[bench]]
name = "lagrange"
harness = false

[profile.bench]
debug = true    # for running cargo flamegraph on benchmarks
