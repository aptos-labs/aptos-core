apiVersion: v1
kind: Pod
metadata:
  name: worker-pod-9
  labels:
    run: some-label
  annotations: { }
spec:
  serviceAccountName: default
  restartPolicy: Never # Pod restarts only if it fails
  containers:
    - name: replay-verify-worker
      image: us-docker.pkg.dev/aptos-registry/docker/tools:nightly
      volumeMounts:
        - mountPath: /mnt/archive
          name: archive
          readOnly: true # Mount the volume as read-only
      command: [ "/bin/sh", "-c", "ls -al /mnt/archive && sleep 3600" ]
      env:
        #- name: PUSH_METRICS_ENDPOINT
        #  value: "http://localhost:9091"
        - name: RUST_LOG
          value: "info"
        - name: RUST_BACKTRACE
          value: "full"
        # Replay executes Move on rayon/std worker threads that don't set an
        # explicit stack size, so they inherit RUST_MIN_STACK. Bump above the
        # 2 MiB default to avoid stack overflows replaying deeply nested values.
        - name: RUST_MIN_STACK
          value: "33554432" # 32 MiB
      resources:
        requests:
          memory: "100Gi"
          cpu: "28"
  volumes:
    - name: archive
      persistentVolumeClaim:
        claimName: testnet-archive-9
  tolerations:
  - key: aptos-workload
    operator: Equal
    value: "replay-verify"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: cloud.google.com/machine-family
              operator: In
              values:
              - "t2d"
              - "c3d"
            - key: node-restriction.kubernetes.io/aptos-workload
              operator: In
              values:
              - "replay-verify"
