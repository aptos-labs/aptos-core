apiVersion: v1  
kind: PersistentVolume  
metadata:  
  name: testnet-archive  
spec:  
  capacity:  
    storage: 10000Gi  
  accessModes:  
    - ReadOnlyMany  
  hostPath:  
    path: "/mnt/testnet_archive"  
  persistentVolumeReclaimPolicy: Retain  
  storageClassName: standard  
---  
apiVersion: v1  
kind: PersistentVolumeClaim  
metadata:  
  name: testnet-archive-claim  
spec:  
  accessModes:  
    - ReadOnlyMany  
  resources:  
    requests:  
      storage: 10000Gi  
  storageClassName: standard  
  volumeName: testnet-archive
